            ### セクション8: リスクユーザー一覧テーブル
            - UPN / リスクレベル / リスク状態 / 最終更新 の4列テーブル

            ### セクション9: 高リスクサインイン一覧
            - ユーザー / 日時 / アプリ / 国 / リスク詳細 の5列テーブル

            ### セクション10: 推奨アクション
            収集データに基づき以下を判定してアクションを列挙する:
            - High リスクユーザーが 1 名以上 → 「即時パスワードリセットおよび MFA 強制を推奨」
            - 失敗サインインが全体の 10% 超 → 「ブルートフォース攻撃の可能性を調査推奨」
            - 海外からのサインインが検出 → 「Conditional Access ポリシーの地理的制限を確認推奨」
            - Medium/High リスクイベントが 5 件超 → 「Identity Protection ポリシーの強化を推奨」

            ### フッター
            - 「本レポートは Microsoft Security Copilot により自動生成されました」
            - 生成エージェント名と日時

            ## CSS スタイル要件 (メール対応)
            - フォント: Meiryo, 'メイリオ', 'Segoe UI', sans-serif
            - 全体の背景色: #f5f5f5、コンテンツ背景: #ffffff
            - プライマリカラー: #0078D4 (Microsoft Blue)
            - Severity 配色: Critical: #D13438, High: #FF8C00, Medium: #FFB900, Low: #107C10
            - テーブル: ゼブラストライプ (偶数行 #f9f9f9)、border-collapse: collapse
            - 全体幅: max-width 680px (メール表示に最適化)
            - font-size: 本文 14px、見出し 18-22px、テーブル 13px
            - line-height: 1.6
            - パディング: セクション間 20px、セル内 8px 12px
            - 全スタイルをインライン (style 属性) で適用すること

            ## Step 9: メール送信
            生成した HTML 全文を SendSocReportEmail の ReportHtml パラメータに渡して送信する。

            - HTML の生成が完了したら、必ずそのまま直ちに SendSocReportEmail を呼び出すこと。
            - **SendSocReportEmail を呼び出す際は ReportHtml のみ渡すこと。それ以外のパラメータは渡してはならない。**
            - レポート本文や「次のステップ」だけを返して終了してはならない。
            - 最終応答は SendSocReportEmail の呼び出し後にのみ返すこと。
            - SendSocReportEmail が失敗した場合は、失敗した旨と理由を返すこと。

            # Final Output
            メール送信完了のステータスメッセージを返す。
            送信したレポートの概要（High リスクユーザー数・高リスクサインイン数・異常な失敗サインインのハイライト）を含める。
            「次のステップ」や「これからメール送信します」のような途中経過では終了しないこと。

        ChildSkills:
          - GetEntraData
          - GetEntraSignInLogsV1
          - GetEntraRiskyUsers
          - SendSocReportEmail

  # ── LogicApp Skill (Outlook 通知) ────────────────────────────────
  - Format: LogicApp
    Skills:
      - Name: SendSocReportEmail
        DisplayName: SOC レポートメール送信
        Description: >-
          生成した HTML レポートを Outlook 経由で SOC に送信する。
          件名・本文（HTML）を受け取り Azure Logic App 経由でメール送信する。
        Inputs:
          - Name: ReportHtml
            Description: 送信する HTML レポートの全文
            Required: true
        Settings:
          SubscriptionId: "{{LogicAppSubscriptionId}}"
          ResourceGroup: "{{LogicAppResourceGroup}}"
          WorkflowName: "{{LogicAppWorkflowName}}"
          TriggerName: manual
