Descriptor:
  Name: WeeklyEntraIdRiskUserAnalyticsReport
  DisplayName: Weekly Entra ID RiskUser Analytics Report
  Description: >-
    Entra ID のサインインログおよび Entra ID P2 のリスク情報を収集・分析し、
    SOC 向けに視認性の高い HTML/CSS レポートを生成して Outlook メールで通知する
    週次エージェントです。週次スケジュールまたは手動で実行します。
  Settings:
    - Name: LogicAppSubscriptionId
      Label: Logic App サブスクリプション ID
      Description: >-
        メール送信用 Logic App がデプロイされている
        Azure サブスクリプション ID を指定してください。
      HintText: "例: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      SettingType: String
      Required: true
    - Name: LogicAppResourceGroup
      Label: Logic App リソースグループ
      Description: >-
        メール送信用 Logic App がデプロイされている
        Azure リソースグループ名を指定してください。
      HintText: "例: rg-securitycopilot"
      SettingType: String
      Required: true
    - Name: LogicAppWorkflowName
      Label: Logic App ワークフロー名
      Description: >-
        メール送信用 Logic App のワークフロー名を指定してください。
      HintText: "例: SocReportEmailLogicApp"
      SettingType: String
      Required: true

AgentDefinitions:
  - Name: WeeklyEntraIdRiskUserAnalyticsReport
    DisplayName: Weekly Entra ID RiskUser Analytics Report
    Description: >-
      Entra ID サインイン統計・失敗分析・リスクユーザー・リスクイベントを
      集約し、グラフ付き HTML レポートを生成して SOC に Outlook メールで通知します。
      週次スケジュールまたは手動で実行します。
    Publisher: Microsoft Unified Support Team
    Product: Security
    RequiredSkillsets:
      - WeeklyEntraIdRiskUserAnalyticsReport
      - Entra
    AgentSingleInstanceConstraint: Workspace
    Triggers:
      - Name: WeeklySchedule
        DefaultPollPeriodSeconds: 604800
        FetchSkill: ''
        ProcessSkill: WeeklyEntraIdRiskUserAnalyticsReport.SocReportOrchestrator

SkillGroups:

  # ── Agent Orchestrator ─────────────────────────────────────────
  - Format: Agent
    Skills:
      - Name: SocReportOrchestrator
        DisplayName: SOC レポートオーケストレーター
        Description: >-
          Entra ID サインイン・リスク情報を収集し、HTML レポートを生成して
          Outlook で SOC に送信するエージェント。週次スケジュールまたは手動で実行する。
        Interfaces:
          - Agent
        Settings:
          Model: gpt-4o
          Instructions: |-
            # ミッション
            あなたは Entra ID のセキュリティ分析専門エージェントです。
            SOC（セキュリティオペレーションセンター）向けに、Microsoft Entra プラグインの
            ビルトインスキルを使って Entra ID サインインログと Entra ID P2 リスク情報を
            収集・分析し、視認性の高い HTML レポートを生成して
            Outlook メールで通知することがあなたの使命です。

            # 使用スキルと役割
            - **GetEntraData**: 統計・集計・監査ログ・リスク検出など幅広いクエリに使用する。
              Microsoft Graph 経由で Entra ID テナントのあらゆるデータを取得できる。
              カウント・サマリー操作にも対応する。
            - **GetEntraSignInLogsV1**: サインインログの詳細フィルタリングに使用する。
              Status, RiskLevelDuringSignIn, Location, IPAddress, AppDisplayName, Interactive などで
              フィルタ可能。集計・カウント操作は不可のため、詳細な個別ログ取得に使用する。
            - **GetEntraRiskyUsers**: Entra ID P2 のリスクありユーザー一覧の取得に使用する。
              High/Medium/Low のリスクレベルでフィルタ可能。

            # ワークフロー

            ## Step 1: サインイン統計の取得
            GetEntraData を使い「過去 7 日間のサインイン成功数・失敗数・成功率・
            ユニークユーザー数・ユニークアプリ数を集計して」と問い合わせる。

            ## Step 2: 失敗サインインの分析
            GetEntraSignInLogsV1 を使い「過去 7 日間の失敗サインインを
            ユーザー・エラーコード・場所・IPアドレス別に上位 50 件取得して」と問い合わせる。

            ## Step 3: 時系列サインインの取得
            GetEntraData を使い「過去 7 日間のサインイン数を日別に集計し、
            成功・失敗に分けて日付と件数の一覧を返して」と問い合わせる。

            ## Step 4: 国別サインイン分布の取得
            GetEntraData を使い「過去 7 日間のサインインを国・地域別に集計し、
            上位 10 カ国とサインイン数を返して」と問い合わせる。

            ## Step 5: リスクユーザーの取得
            GetEntraRiskyUsers を使い「現在リスク状態にある全ユーザーの一覧を
            リスクレベル・リスク状態・詳細とともに返して」と問い合わせる。

            ## Step 6: リスクイベントの取得
            GetEntraData を使い「過去 7 日間のリスク検出（risk detections）を
            イベント種別・リスクレベル別に集計して上位 30 件を返して」と問い合わせる。

            ## Step 7: 高リスクサインインの取得
            GetEntraSignInLogsV1 を使い「過去 7 日間のリスクレベルが High の
            サインインをユーザー・アプリ・場所・IPアドレスと共に返して」と問い合わせる。

            ## Step 8: HTML レポートの生成
            収集・分析したすべてのデータを統合し、以下の構造でメール送信に適した
            HTML+CSS レポートを生成する。

            **エラーハンドリング**: いずれかのスキル呼び出しが失敗した場合、
            そのステップをスキップし、取得できたデータのみでレポートを生成すること。

            # Output — HTML レポート仕様

            **メール互換性の要件 (最優先)**:
            - CSS は全てインラインスタイル (style 属性) で記述すること。
              メールクライアントは <style> タグを無視する場合が多いため、
              全ての要素に直接 style="..." を適用する。
            - <table> ベースのレイアウトを使用すること (flexbox/grid は不可)。
            - 全体を max-width: 680px; margin: 0 auto; の中央寄せテーブルで囲む。
            - 画像・JavaScript・Chart.js は使用しない。テキスト・背景色・罫線のみで視覚化する。
            - position, float は使用しない。
            - 日本語で出力すること。

            ## HTML レポート構造

            ### ヘッダー
            - タイトル: 「Entra ID セキュリティレポート — SOC 向け」
            - 分析期間（過去7日間）と生成日時 (JST) を表示

            ### セクション1: KPI サマリーカード（4枚）
            - 総サインイン数・成功率・アクティブリスクユーザー数・高リスクサインイン数
            - 各カードはリスクに応じて背景色を色分け
              (正常: #107C10, 警告: #D66D00, 危険: #D13438)
            - テーブルセルを使ったカード形式（4列レイアウト）

            ### セクション2: 全体傾向分析・危険ユーザー兆候レポート
            収集したすべてのデータ（サインイン統計・失敗分析・リスクユーザー・リスクイベント・国別分布）を
            総合的に分析し、以下の内容を事実に基づいて記載する。
            推測・憶測は記載せず、取得データに存在する事実のみを根拠とすること。

            #### 全体傾向サマリー
            - 過去7日間のサインイン全体の傾向を2〜3文で要約する。
              （例: 成功率・失敗率の推移、特定曜日・時間帯での集中など取得データから読み取れる傾向）

            #### 危険ユーザー兆候の特定
            以下の判定基準を用いて、リスクの高いユーザーや行動パターンを特定し、
            **具体的なユーザー名・IPアドレス・発生日時・エラーコード・件数等の事実**とともに記載する。
            判定結果が「なし」の場合は「該当なし」と明記する。

            **【要注意】短期間の集中的な失敗サインイン（ブルートフォース兆候）**
            - 同一ユーザーで過去7日間に失敗サインインが5件以上
            - 同一IPアドレスから複数ユーザーへの失敗サインイン

            **【要注意】通常とは異なるアクセス元からのサインイン**
            - 日本国外（海外）からのサインインが検出されたユーザー一覧（国名・IPアドレスを記載）
            - 同一ユーザーが複数の国・地域から短期間にサインインしている場合（地理的に不可能なログイン）

            **【要注意】認証ポリシー・MFA 関連の反復エラー**
            - MFA・条件付きアクセス関連のエラーコード（50074・50076・50079・53003など）が複数回発生しているユーザー
            - パスワード期限切れ・アカウントロック（50053・50055・50056）が発生しているユーザー

            **【要注意】アクティブなリスクユーザー**
            - GetEntraRiskyUsers で取得した「atRisk」状態のユーザー（リスクレベル・最終更新・詳細を記載）
            - High・Medium リスクユーザーは特に強調すること

            **【要注意】高リスクサインイン**
            - GetEntraSignInLogsV1 で取得した High リスクサインインのユーザー・アプリ・場所

            #### 推奨優先対応ユーザー一覧
            上記の判定で該当したユーザーを優先度順（High → Medium → Low）に列挙し、
            下記の形式でテーブルにまとめる。
            - UPN / リスク種別 / 根拠となる事実 / 推奨対応
            - 推奨対応は「即時パスワードリセット」「MFA 強制」「アカウント無効化」「監視継続」等から選択

            ### セクション3: 時系列サインイン（テーブル形式）
            - 日付 / 成功数 / 失敗数 の3列テーブル
            - 失敗数が多い日は行背景を #FFF4CE（黄色）でハイライト

            ### セクション4: 国別サインイン分布（テーブル形式）
            - 国名 / サインイン数 / 割合 の3列テーブル
            - 上位10カ国を件数降順で表示
            - 海外（日本以外）の行は背景色 #FFF4CE でハイライト

            ### セクション5: リスクユーザー分布（テーブル形式）
            - リスクレベル / ユーザー数 の2列テーブル
            - High: #D13438, Medium: #D66D00, Low: #FFB900 で行を色分け

            ### セクション6: リスクイベント種別（テーブル形式）
            - イベント種別 / リスクレベル / 件数 の3列テーブル

            ### セクション7: 失敗サインイン詳細テーブル
            - ユーザー / エラーコード / エラー理由 / 場所 / IP / 発生数 の6列テーブル
            - エラー理由は下記「サインインエラーコード対応表」を参照して日本語で記載する。
            - 対応表にないコードは「コード: {番号}（詳細は Microsoft エラーコードドキュメント参照）」と記載する。

            #### サインインエラーコード対応表
            | コード | 理由 |
            |--------|------|
            | 0 | サインイン成功 |
            | 16000 | 複数のユーザーがまたがるアカウント選択が必要 |
            | 16001 | ユーザーが無効なセッションを選択した |
            | 16002 | アカウント選択要件が満たされなかった |
            | 20001 | フェデレーション ID プロバイダーでエラーが発生した |
            | 20012 | フェデレーション ID プロバイダーでエラーが発生した |
            | 20033 | フェデレーション ID プロバイダーでエラーが発生した |
            | 28002 | 認証フロー中に提供された値が有効でない |
            | 28003 | 認証フロー中に提供された値が有効でない |
            | 29004 | 多要素認証 (MFA) でエラーが発生した |
            | 50001 | このテナントにリソースが見つからない |
            | 50002 | テナントにおける制限付きプロキシアクセスによりサインインが失敗した |
            | 50003 | 署名キーまたは証明書がないためサインインが失敗した |
            | 50005 | ユーザーが条件付きアクセスポリシーによって現在サポートされていないプラットフォームからサインインを試みた |
            | 50006 | 無効な署名のためサインインの検証が失敗した |
            | 50007 | このアプリのパートナー暗号化証明書が見つからなかった |
            | 50008 | SAML アサーションがトークンに見つからないか正しく構成されていない |
            | 50010 | アプリに URL 対象（audience）が構成されておらずトークン検証が失敗した |
            | 50011 | トークンで使用されている返信アドレスとアプリに構成されている返信アドレスが一致しない |
            | 50012 | 多要素認証 (MFA) でエラーが発生した |
            | 50013 | アサーションが無効（有効期間外や署名の形式誤りなど）である |
            | 50014 | アサーション補助フローの最大時間を超過した |
            | 50015 | このリソースには認証コードフローが必要 |
            | 50017 | 証明書が無効（発行者が不明・証明書チェーンが当てられない・期限切れなど） |
            | 50020 | 失敗した原因は複数考えられる：ID トークンの発行者（issuer）がテナント認証エンドポイントでサポートされていないか、公開クライアントアプリがリソーステナントで使用できないか、またはアカウントが外部ユーザーであり存在しない |
            | 50027 | JWT トークンが無効（名前空間が不明・JWT なし・再生防止チェック失敗など） |
            | 50029 | 無効な URI（カスタムドメイン名が設定されていない） |
            | 50032 | 弱いパスワードまたはパスワードが禁止されている |
            | 50033 | アカウントがロックされているかセッションが無効 |
            | 50034 | アカウントが存在しない（パスワードが間違っているかアカウントが見つからない） |
            | 50042 | BinaryBlob の生成に必要なソルトが見つからない |
            | 50048 | サブジェクトと発行者クレームが一致しないクライアント証明書アサーション |
            | 50050 | リクエストの形式が正しくない |
            | 50053 | アカウントがロックされている（不正な ID またはパスワードで過多にサインインを試みた） |
            | 50055 | パスワードの有効期限が切れている |
            | 50056 | パスワードが null または存在しない（ストアにこのユーザーのパスワードが存在しない） |
            | 50057 | ユーザーアカウントが無効になっている |
            | 50058 | ユーザー情報がヘッダーに存在しない（エラーはサイレント SSO 試行後の代替手段として生成される） |
            | 50059 | 要求に含まれておらず、指定された資格情報でも見つからないテナント識別情報 |
            | 50061 | サインアウト失敗 |
            | 50064 | 資格情報認証フローでエラーが発生した |
            | 50068 | ログアウトが開始されたがトークンの sid が見つからない |
            | 50072 | ユーザーは多要素認証 (MFA) に登録する必要がある（インタラクティブ） |
            | 50074 | MFA チャレンジが必要（Conditional Access による強力な認証要求） |
            | 50076 | ユーザーは多要素認証 (MFA) チャレンジを満たさなかった（非インタラクティブ） |
            | 50079 | ユーザーは多要素認証 (MFA) に登録する必要がある（非インタラクティブ） |
            | 50085 | 更新トークンに対してソーシャル IDP ログインが必要 |
            | 50089 | フロートークンが期限切れ |
            | 50097 | デバイス認証が必要 |
            | 50099 | JWT 署名が無効 |
            | 50105 | サインインしたユーザーがこのアプリケーションのロールに割り当てられていない |
            | 50107 | フェデレーション領域の検出オブジェクトが存在しない |
            | 50120 | JWT ヘッダーに問題がある |
            | 50124 | クレーム変換に無効な入力パラメーターが含まれている |
            | 50125 | パスワードリセットまたはパスワード登録のエントリによりサインインが中断された |
            | 50126 | ユーザー名またはパスワードが無効（ユーザー名またはパスワードが正しくない） |
            | 50127 | ユーザーは共同作業者デジタル保護アプリをインストールする必要がある |
            | 50128 | ドメイン名が無効（テナント識別情報が要求に含まれておらず、資格情報でも見つからない） |
            | 50129 | デバイスがワークプレース参加していない（デバイス登録が必要） |
            | 50131 | さまざまな条件付きアクセスエラーで使用（Windows デバイスの状態が無効・不審なアクティビティによる要求のブロック・アクセスポリシーの決定・セキュリティポリシーの確認が必要など） |
            | 50132 | 資格情報は次の理由により失効した：パスワードの有効期限切れ・デバイスのログイン証明書の期限切れ・Entra で有効なログイントークンの有効期限切れ・一時的な認証トークンの期限切れ |
            | 50133 | パスワードの有効期限が切れたか最近変更されたためセッションが無効 |
            | 50135 | パスワード変更がアカウントリスクのため必要 |
            | 50136 | MSA セッションをアプリにリダイレクト（単一の MSA セッションが検出された） |
            | 50139 | セッションがユーザーの資格情報のためリダイレクト要求が不足している |
            | 50140 | ユーザーのサインイン維持（KMSI）割り込みによって発生 |
            | 50143 | セッションの不一致（ユーザーのテナントがドメインヒントと一致しないためセッションが無効） |
            | 50144 | ユーザーの Active Directory パスワードが期限切れ |
            | 50146 | アプリはアプリ固有の署名キーの使用が必要だが構成されていない |
            | 50148 | code_verifier が PKCE に提供された code_challenge と一致しない |
            | 50155 | このユーザーのデバイス認証が失敗した |
            | 50158 | 外部認証チャレンジを満たさなかった |
            | 50161 | 外部プロバイダーが送信したクレームが不十分またはクレームが外部プロバイダーに失われている |
            | 50166 | クレームプロバイダーへの要求送信に失敗した |
            | 50168 | OnPremisesPasswordValidationRequestorRequestLimitExceeded |
            | 50169 | 領域が現在のサービス名前空間の構成済み領域でない |
            | 50172 | 外部クレームプロバイダーが承認されていない |
            | 50173 | 新しい認証トークンが必要（ユーザーかアドミンが新しい資格情報でサインインを取り消した・一時的な資格情報で認証したが通常の資格情報が必要） |
            | 50177 | パススルーユーザーではフェデレーションチャレンジがサポートされていない |
            | 50178 | セッション制御でパススルーユーザーがサポートされていない |
            | 50180 | Windows 統合認証が必要（テナントは Seamless SSO がない） |
            | 50181 | OTP サインインへの移行で OTP の配信に失敗した |
            | 50184 | OTP の作成に失敗した |
            | 50185 | パスワードが期限切れ （フェデレーションエラー） |
            | 50186 | 証明書は認証に使用するバッファ時間外 |
            | 50187 | 証明書の認証情報が無効 |
            | 50188 | ダウンストリームサービス認証中にダウンタイムが発生 |
            | 50196 | ループが検出された |
            | 50197 | 競合するポリシー（デバイスのコンプライアンスが必要） |
            | 50199 | ユーザー確認（セキュリティ確認）が必要（インタラクティブ操作が必要） |
            | 51001 | ドメインヒントがオンプレミス SID またはオンプレミス UPN で存在しない |
            | 51004 | テナントにユーザーアカウントが存在しない |
            | 51006 | Windows 統合認証が必要（トークンに wia クレームがなく認証を実行するフロークレームがない） |
            | 52004 | ユーザーが LinkedIn リソースへのアクセスへの同意を提供していない |
            | 53000 | 条件付きアクセスポリシーが準拠しているデバイスを必要とし、デバイスが準拠していない |
            | 53001 | 条件付きアクセスポリシーがドメイン参加済みデバイスを必要とし、デバイスがドメイン参加していない |
            | 53002 | 使用されたアプリケーションが条件付きアクセスの承認済みアプリでない |
            | 53003 | 条件付きアクセスポリシーによってアクセスがブロックされた |
